<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCGuides — Facilitator Login</title>
  <meta name="description" content="Facilitator sign-in for SYSARCH guidance appointment system." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #F8F5EE;
      --bg-secondary: #EDE8DC;
      --bg-card: rgba(255, 253, 248, 0.96);
      --border-color: rgba(143, 175, 138, 0.38);
      --accent-blue: #6B9B65;
      --accent-violet: #2D5016;
      --grad-primary: linear-gradient(135deg, #8FAF8A 0%, #4A7C40 100%);
      --text-primary: #1C2B18;
      --text-secondary: #4A6344;
      --text-muted: #8FAF8A;
      --radius-sm: 8px;
      --radius-xl: 32px;
      --shadow-card: 0 8px 32px rgba(45, 80, 22, 0.10);
      --transition: all .3s cubic-bezier(.4, 0, .2, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      cursor: pointer;
      font-family: inherit;
    }

    input,
    select,
    textarea {
      font-family: inherit;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent-blue);
      border-radius: 3px;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 8s ease-in-out infinite;
    }

    .bg-orb-1 {
      width: 500px;
      height: 500px;
      background: rgba(143, 175, 138, 0.18);
      top: -100px;
      left: -100px;
    }

    .bg-orb-2 {
      width: 400px;
      height: 400px;
      background: rgba(74, 124, 64, 0.10);
      bottom: -80px;
      right: -80px;
      animation-delay: -4s;
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-30px) scale(1.05);
      }
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(143, 175, 138, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(143, 175, 138, 0.08) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 28px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .3px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .btn-full {
      width: 100%;
    }

    .btn-lg {
      padding: 16px 40px;
      font-size: 16px;
    }

    .btn-primary {
      background: var(--grad-primary);
      color: #fff;
      box-shadow: 0 4px 20px rgba(74, 124, 64, 0.32);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 28px rgba(45, 80, 22, 0.45);
      transform: translateY(-1px);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: .5px;
    }

    .form-input {
      background: rgba(255, 255, 255, .8);
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: 12px 16px;
      font-size: 14px;
      transition: var(--transition);
      outline: none;
      width: 100%;
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(143, 175, 138, 0.22);
      background: rgba(143, 175, 138, 0.06);
    }

    .form-stack {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .auth-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }

    .auth-logo-link {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .auth-logo-icon {
      width: 42px;
      height: 42px;
      background: var(--grad-primary);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-logo-icon svg {
      width: 22px;
      height: 22px;
      color: #fff;
    }

    .auth-logo-name {
      font-size: 22px;
      font-weight: 800;
      background: var(--grad-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-card {
      background: rgba(255, 253, 248, 0.96);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: 0 24px 64px rgba(45, 80, 22, 0.10);
    }

    .auth-card-header {
      margin-bottom: 32px;
      text-align: center;
    }

    .auth-card-title {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .auth-card-sub {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .password-field {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      transition: var(--transition);
    }

    .password-toggle:hover {
      color: var(--text-primary);
    }

    #toast-container {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 14px 20px;
      font-size: 14px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 280px;
      animation: toastIn .4s ease, toastOut .4s ease 2.6s forwards;
    }

    .toast.success {
      border-color: rgba(16, 185, 129, .4);
    }

    .toast.error {
      border-color: rgba(239, 68, 68, .4);
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(40px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
        transform: translateX(40px);
      }
    }
  </style>
</head>

<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="grid-bg"></div>
  <div id="toast-container"></div>

  <div class="auth-container">
    <a href="../index.html" class="auth-logo-link">
      <div class="auth-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
      </div>
      <span class="auth-logo-name">UCGuides</span>
    </a>

    <div class="auth-card">
      <div class="auth-card-header">
        <div style="font-size:48px;margin-bottom:12px;display:flex;justify-content:center;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#4a9de0" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round" style="width:52px;height:52px;">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
        </div>
        <h1 class="auth-card-title">Facilitator Portal</h1>
        <p class="auth-card-sub">Sign in with your facilitator credentials to access the dashboard.</p>
      </div>

      <div
        style="background:rgba(143,175,138,0.14);border:1px solid rgba(107,155,101,0.30);border-radius:10px;padding:12px 16px;margin-bottom:24px;font-size:13px;color:#2D5016;display:flex;align-items:center;gap:10px;">
        <span>💡</span>
        <div><strong>Demo credentials:</strong><br />
          Email: <code>facilitator@sysarch.edu</code> &nbsp;|&nbsp; Password: <code>facilitator123</code>
        </div>
      </div>

      <form id="facilitatorLoginForm" novalidate>
        <div class="form-stack">
          <div class="form-group">
            <label class="form-label" for="fac-email">Email Address</label>
            <input id="fac-email" class="form-input" type="email" name="email" placeholder="facilitator@sysarch.edu"
              required autocomplete="email" value="facilitator@sysarch.edu" />
          </div>
          <div class="form-group">
            <label class="form-label" for="fac-password">Password</label>
            <div class="password-field">
              <input id="fac-password" class="form-input" type="password" name="password" placeholder="••••••••"
                required value="facilitator123" />
              <button type="button" class="password-toggle" aria-label="Toggle password">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn btn-full btn-lg btn-primary" id="fac-login-btn">
            Sign In as Facilitator
          </button>
        </div>
      </form>
    </div>

    <div style="text-align:center;margin-top:20px;">
      <a href="../index.html" style="color:var(--text-muted);font-size:13px;">← Back to role selection</a>
    </div>
  </div>

  <script>
    const Store = {
      get(k, fb) { try { const r = localStorage.getItem(k); return r !== null ? JSON.parse(r) : fb; } catch { return fb; } },
      set(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
    };
    const getFacilitator = () => Store.get('facilitator', null);
    const setFacilitator = f => Store.set('facilitator', f);
    const getStudents = () => Store.get('students', []);
    const setStudents = s => Store.set('students', s);
    const getAppointments = () => Store.get('appointments', []);
    const setAppointments = a => Store.set('appointments', a);
    const getMessages = () => Store.get('messages', []);
    const setMessages = m => Store.set('messages', m);
    const getCurrentUser = () => Store.get('currentUser', null);
    const setCurrentUser = u => Store.set('currentUser', u);

    function seedData() {
      if (!getFacilitator()) {
        setFacilitator({ id: 'f001', firstName: 'Dr. Ana', lastName: 'Santos', email: 'facilitator@sysarch.edu', password: 'facilitator123', role: 'facilitator', department: 'Guidance & Counseling', contact: '09171234567', bio: 'Licensed guidance counselor with 10+ years of experience.', avatarInitial: 'A' });
      }
      if (!getStudents().length) {
        setStudents([
          { id: 's001', firstName: 'Juan', lastName: 'dela Cruz', age: 20, email: 'juan@gmail.com', password: 'student123', schoolId: '2021-10001', year: '3rd Year', department: 'Computer Science', contact: '09181234567', role: 'student', avatarInitial: 'J' },
          { id: 's002', firstName: 'Maria', lastName: 'Reyes', age: 19, email: 'maria@gmail.com', password: 'student123', schoolId: '2022-10042', year: '2nd Year', department: 'Information Technology', contact: '09191234567', role: 'student', avatarInitial: 'M' }
        ]);
      }
      if (!getAppointments().length) {
        setAppointments([
          { id: 'a001', studentId: 's001', studentName: 'Juan dela Cruz', date: '2026-04-14', time: '09:00 AM', reason: 'Academic concern', status: 'approved', sessions: { first: 'done', second: 'pending', final: 'inactive' } },
          { id: 'a002', studentId: 's002', studentName: 'Maria Reyes', date: '2026-04-16', time: '02:00 PM', reason: 'Personal consultation', status: 'pending', sessions: { first: 'pending', second: 'inactive', final: 'inactive' } }
        ]);
      }
      if (!getMessages().length) {
        const now = Date.now();
        setMessages([
          { id: 'm001', from: 'f001', to: 's001', text: 'Hello Juan! Your first session appointment has been confirmed.', timestamp: new Date(now - 3600000).toISOString() },
          { id: 'm002', from: 's001', to: 'f001', text: 'Thank you, doc! I will be there.', timestamp: new Date(now - 1800000).toISOString() },
          { id: 'm003', from: 'f001', to: 's002', text: 'Hi Maria! Please confirm your appointment schedule.', timestamp: new Date(now - 7200000).toISOString() }
        ]);
      }
    }
    seedData();

    const cu = getCurrentUser();
    if (cu && cu.role === 'facilitator') window.location.href = 'facilitator-dashboard.html';

    function showToast(msg, type = 'info') {
      const icons = { success: '✅', error: '❌', info: 'ℹ️' };
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<span>${icons[type] || 'ℹ️'}</span> ${msg}`;
      c.appendChild(t); setTimeout(() => t.remove(), 3100);
    }

    document.querySelector('.password-toggle').addEventListener('click', function () {
      const inp = this.previousElementSibling;
      inp.type = inp.type === 'password' ? 'text' : 'password';
      this.textContent = inp.type === 'password' ? '👁️' : '🙈';
    });

    document.getElementById('facilitatorLoginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const btn = document.getElementById('fac-login-btn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      const fd = new FormData(this);
      const email = fd.get('email'), password = fd.get('password');
      const fac = getFacilitator();
      if (!fac || fac.email !== email || fac.password !== password) {
        showToast('Invalid email or password.', 'error');
        btn.disabled = false; btn.innerHTML = '🔑 Sign In as Facilitator'; return;
      }
      setCurrentUser({ ...fac, role: 'facilitator' });
      showToast('Welcome back! 👩‍⚕️', 'success');
      setTimeout(() => { window.location.href = 'facilitator-dashboard.html'; }, 600);
    });
  </script>
</body>

</html>
