<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYSARCH — Facilitator Login</title>
  <meta name="description" content="Facilitator sign-in for SYSARCH guidance appointment system." />
</head>
<body class="auth-page">
  <div class="bg-orb bg-orb-1" style="background:rgba(139,92,246,0.1);"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="grid-bg"></div>
  <div id="toast-container"></div>

  <div class="auth-container">
    <a href="/" class="auth-logo-link">
      <div class="auth-logo-icon" style="background:linear-gradient(135deg,#8b5cf6,#6366f1);">👩‍⚕️</div>
      <span class="auth-logo-name" style="background:linear-gradient(135deg,#8b5cf6,#6366f1);-webkit-background-clip:text;">SYSARCH</span>
    </a>

    <div class="auth-card">
      <div class="auth-card-header">
        <div style="font-size:48px;margin-bottom:12px;">👩‍⚕️</div>
        <h1 class="auth-card-title">Facilitator Portal</h1>
        <p class="auth-card-sub">Sign in with your facilitator credentials to access the dashboard.</p>
      </div>

      <!-- Hint banner -->
      <div style="background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);border-radius:10px;padding:12px 16px;margin-bottom:24px;font-size:13px;color:#c4b5fd;display:flex;align-items:center;gap:10px;">
        <span>💡</span>
        <div>
          <strong>Demo credentials:</strong><br/>
          Email: <code>facilitator@sysarch.edu</code> &nbsp;|&nbsp; Password: <code>facilitator123</code>
        </div>
      </div>

      <form id="facilitatorLoginForm" novalidate>
        <div class="form-stack">
          <div class="form-group">
            <label class="form-label" for="fac-email">Email Address</label>
            <input id="fac-email" class="form-input" type="email" name="email"
              placeholder="facilitator@sysarch.edu" required autocomplete="email"
              value="facilitator@sysarch.edu" />
          </div>
          <div class="form-group">
            <label class="form-label" for="fac-password">Password</label>
            <div class="password-field">
              <input id="fac-password" class="form-input" type="password" name="password"
                placeholder="••••••••" required value="facilitator123" />
              <button type="button" class="password-toggle" aria-label="Toggle password">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn btn-full btn-lg" id="fac-login-btn"
            style="background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff;border:none;box-shadow:0 4px 20px rgba(139,92,246,.4);">
            🔑 Sign In as Facilitator
          </button>
        </div>
      </form>
    </div>

    <div style="text-align:center;margin-top:20px;">
      <a href="/" style="color:var(--text-muted);font-size:13px;">← Back to role selection</a>
    </div>
  </div>

  <script type="module" src="/src/facilitator-auth.ts"></script>
</body>
</html>
