<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYSARCH — Student Login / Sign Up</title>
  <meta name="description" content="Student login and registration for SYSARCH." />
</head>
<body class="auth-page">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="grid-bg"></div>
  <div id="toast-container"></div>

  <div class="auth-container">
    <a href="/" class="auth-logo-link">
      <div class="auth-logo-icon">🎓</div>
      <span class="auth-logo-name">SYSARCH</span>
    </a>

    <div class="auth-card">
      <div class="auth-card-header">
        <h1 class="auth-card-title">Student Portal</h1>
        <p class="auth-card-sub">Login to your account or create a new one.</p>
      </div>

      <!-- Tab Toggle -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" id="tab-login" role="tab">Login</button>
        <button class="auth-tab" id="tab-signup" role="tab">Sign Up</button>
      </div>

      <!-- LOGIN -->
      <div class="auth-form" id="form-login" style="display:block;">
        <form id="loginForm" novalidate>
          <div class="form-stack">
            <div class="form-group">
              <label class="form-label" for="login-email">Gmail Address</label>
              <input id="login-email" class="form-input" type="email" name="email"
                placeholder="you@gmail.com" required autocomplete="email" />
            </div>
            <div class="form-group">
              <label class="form-label" for="login-password">Password</label>
              <div class="password-field">
                <input id="login-password" class="form-input" type="password" name="password"
                  placeholder="••••••••" required />
                <button type="button" class="password-toggle" aria-label="Toggle password">👁️</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">🔑 Login</button>
            <p style="text-align:center;font-size:13px;color:var(--text-muted);">
              Don't have an account? <button type="button" class="auth-link" id="go-signup">Sign Up</button>
            </p>
          </div>
        </form>
      </div>

      <!-- SIGN UP -->
      <div class="auth-form" id="form-signup">
        <form id="signupForm" novalidate>
          <div class="form-stack">
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" for="su-firstname">First Name</label>
                <input id="su-firstname" class="form-input" type="text" name="firstName" placeholder="Juan" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="su-lastname">Last Name</label>
                <input id="su-lastname" class="form-input" type="text" name="lastName" placeholder="dela Cruz" required />
              </div>
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" for="su-age">Age</label>
                <input id="su-age" class="form-input" type="number" name="age" placeholder="18" min="15" max="60" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="su-contact">Contact Number</label>
                <input id="su-contact" class="form-input" type="tel" name="contact" placeholder="09XXXXXXXXX" required />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="su-email">Gmail Address</label>
              <input id="su-email" class="form-input" type="email" name="email" placeholder="you@gmail.com" required />
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" for="su-schoolid">School ID</label>
                <input id="su-schoolid" class="form-input" type="text" name="schoolId" placeholder="2024-10001" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="su-year">Year Level</label>
                <select id="su-year" class="form-input" name="year" required>
                  <option value="" disabled selected>Select Year</option>
                  <option>1st Year</option><option>2nd Year</option>
                  <option>3rd Year</option><option>4th Year</option><option>5th Year</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="su-dept">Department / Course</label>
              <select id="su-dept" class="form-input" name="department" required>
                <option value="" disabled selected>Select Department</option>
                <option>Computer Science</option><option>Information Technology</option>
                <option>Engineering</option><option>Business Administration</option>
                <option>Education</option><option>Nursing</option>
                <option>Architecture</option><option>Criminology</option>
                <option>Psychology</option><option>Other</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="su-password">Password</label>
              <div class="password-field">
                <input id="su-password" class="form-input" type="password" name="password"
                  placeholder="Min. 6 characters" required minlength="6" />
                <button type="button" class="password-toggle" aria-label="Toggle password">👁️</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" id="signup-btn">🚀 Create Account</button>
            <p style="text-align:center;font-size:13px;color:var(--text-muted);">
              Already have an account? <button type="button" class="auth-link" id="go-login">Login</button>
            </p>
          </div>
        </form>
      </div>
    </div>

    <div style="text-align:center;margin-top:20px;">
      <a href="/" style="color:var(--text-muted);font-size:13px;">← Back to role selection</a>
    </div>
  </div>

  <script type="module" src="/src/student-auth.ts"></script>
</body>
</html>
